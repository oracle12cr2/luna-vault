# 한국 ETF 백테스트 설정
data:
  # 백테스트 기간
  start_date: "2020-01-01"
  end_date: "2023-12-31"
  
  # 핵심 6종 포트폴리오 (930만원, 소액 집중)
  etfs:
    ace200: "102110.KS"                # 1. ACE 200 (시장 대표) - 25%
    kodex_leverage: "122630.KS"        # 2. KODEX 레버리지 (공격형) - 15%
    tiger_semi: "091230.KS"            # 3. TIGER 반도체 (성장 섹터) - 20%
    kodex_dividend: "279530.KS"        # 4. KODEX 고배당 (안정+배당) - 15%
    kodex_gold: "132030.KS"            # 5. KODEX 골드선물(H) (헤지) - 15%
    kodex_bond: "148070.KS"            # 6. KODEX 국고채10년 (안전자산) - 10%

  # 종목별 비중
  weights:
    ace200: 0.25
    kodex_leverage: 0.15
    tiger_semi: 0.20
    kodex_dividend: 0.15
    kodex_gold: 0.15
    kodex_bond: 0.10

# 백테스트 설정
backtest:
  initial_cash: 9300000   # 930만원
  commission: 0.0015      # 수수료 0.15%
  
# 전략별 파라미터
strategies:
  moving_average_cross:
    name: "이동평균 크로스 전략"
    enabled: true
    params:
      short_period: 20
      long_period: 60
      
  rsi_strategy:
    name: "RSI 과매수/과매도 전략"
    enabled: true
    params:
      period: 12        # 최적화: 14→12 (더 빠른 반응)
      oversold: 11      # 최적화: 30→11 (극단적 과매도만 진입)
      overbought: 55    # 최적화: 70→55 (빠른 수익실현)
      # 결과: 수익률 11.4%, 드로다운 -1.7%, 샤프 0.665
      
  dual_momentum:
    name: "듀얼 모멘텀 전략"
    enabled: true
    params:
      lookback_period: 252  # 1년
      risk_free_rate: 0.02  # 2%

  grid_trading:
    name: "분할매매 전략 (추천)"
    enabled: true
    params:
      ma_period: 10          # 최적화: 20→10
      grid_pct: 5            # 매매 기준 이격도 (%)
      sell_pct: 5            # 최적화: 10→5 (보유량의 %)
      buy_pct: 15            # 최적화: 10→15 (현금의 %)
      # 결과: 수익률 37.4%, 샤프 0.62, DD -21.9%
      
  asset_allocation:
    name: "정적 자산배분 전략"
    enabled: true
    params:
      stock_ratio: 0.6      # 주식 60%
      bond_ratio: 0.4       # 채권 40%
      rebalance_months: 3   # 3개월마다 리밸런싱
      
# 결과 출력 설정
output:
  save_charts: true
  chart_format: "png"
  results_dir: "results"

# ETF 자동매매 시스템 설정 (Redis 클러스터 업데이트)

# 데이터베이스 설정
database:
  type: "oracle"
  host: "oracle19c01"
  port: 1521
  service: "PROD"
  user: "stock"
  password: "stock123"
  
  pool_size: 5
  max_overflow: 10
  table_prefix: "etf_"

# Redis 클러스터 설정 (실제 구성)
redis_cluster:
  # 클러스터 노드들
  nodes:
    - host: "192.168.50.3"
      port: 6379
    - host: "192.168.50.4"
      port: 6379
    - host: "192.168.50.5"
      port: 6379
  
  # 클러스터 설정
  password: "redis"
  decode_responses: true
  skip_full_coverage_check: true
  health_check_interval: 30
  
  # 연결 풀 설정
  max_connections: 50
  retry_on_timeout: true
  socket_timeout: 5
  socket_connect_timeout: 5

# 레거시 Redis 설정 (백워드 호환)
redis:
  host: "192.168.50.3"  # 클러스터 첫 번째 노드
  port: 6379
  password: "redis"

# 한국투자증권 API 설정
kis_api:
  base_url: "https://openapi.koreainvestment.com:9443"
  demo_url: "https://openapivts.koreainvestment.com:29443"
  environment: "demo"
  
  app_key: "${KIS_APP_KEY}"
  app_secret: "${KIS_APP_SECRET}"
  account_no: "${KIS_ACCOUNT_NO}"
  
  daily_limit: 10000
  requests_per_second: 10

# ETF 종목 설정
etf:
  target_codes:
    - "069500"  # KODEX 200
    - "229200"  # KODEX KOSDAQ150
    - "102110"  # TIGER 200IT
    - "133690"  # TIGER NASDAQ100
    - "449180"  # KODEX US SP500
    - "161510"  # KODEX 고배당
    - "091230"  # KODEX 2차전지
    - "160580"  # KODEX 삼성우선주
    - "091170"  # TIGER 건설
    - "130680"  # TIGER 원유선물

# 기술적 지표 설정
technical_indicators:
  sma_periods: [5, 20, 60, 200]
  ema_periods: [5, 20, 60, 200]
  rsi_period: 14
  
  macd:
    fast_period: 12
    slow_period: 26
    signal_period: 9
  
  bollinger:
    period: 20
    std_dev: 2

# 매매 신호 설정
trading_signals:
  rsi:
    oversold: 30
    oversold_strong: 20
    overbought: 70
    overbought_strong: 80
  
  signal_weights:
    strong: 3
    medium: 2
    weak: 1

# 실시간 데이터 수집 설정
realtime:
  collection_interval: 10  # 초
  market_hours:
    start: "09:00"
    end: "15:30"
    timezone: "Asia/Seoul"
  
  # Redis 키 TTL 설정
  ttl:
    current_data: 86400      # 24시간
    timeseries: 86400        # 24시간  
    daily_data: 604800       # 7일
    indicators: 86400        # 24시간

# 배치 처리 설정
batch:
  schedule_time: "16:00"     # 장 종료 후
  cleanup_days: 7            # Redis 정리 주기
  backup_retention: 30       # 백업 보관 일수
  
  # 배치 처리 순서
  steps:
    - migrate_daily_prices
    - migrate_technical_indicators
    - migrate_trading_signals
    - cleanup_redis_data
    - update_statistics

# 알림 설정  
notifications:
  # 디스코드 웹훅 알림 (메인 알림 시스템)
  discord:
    enabled: true
    webhook_url: "${DISCORD_WEBHOOK_URL}"
    signal_threshold: "medium"  # weak, medium, strong
    send_market_status: true    # 시장 개장/마감 알림
    send_daily_summary: true    # 일일 요약 알림
    send_system_alerts: true    # 시스템 오류/경고 알림
    
  email:
    enabled: false
    smtp_server: "smtp.gmail.com"
    smtp_port: 587
    username: "${EMAIL_USERNAME}"
    password: "${EMAIL_PASSWORD}"

# 로깅 설정
logging:
  level: "INFO"
  
  file:
    enabled: true
    path: "logs/"
    max_size_mb: 100
    backup_count: 5
    
  console:
    enabled: true
    colored: true

# 성능 설정
performance:
  multiprocessing: false
  worker_processes: 4
  
  cache:
    enabled: true
    ttl_minutes: 5
    
  batch_size: 100

# 보안 설정
security:
  encryption_key: "${ENCRYPTION_KEY}"
  encrypt_api_keys: true
  mask_sensitive_data: true

# 개발/테스트 설정
development:
  simulation_mode: true
  generate_test_data: true
  test_data_days: 180
  api_delay: 0.5
  debug: false
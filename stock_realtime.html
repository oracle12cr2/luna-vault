<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚀 실시간 주식 모니터링</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-height: 100vh;
            padding: 20px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .status-bar {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        
        .status-item {
            background: rgba(255,255,255,0.1);
            padding: 10px 20px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        .stocks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stock-card {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 25px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .stock-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        
        .stock-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #00ff00, #ff0000);
        }
        
        .stock-name {
            font-size: 1.4rem;
            font-weight: bold;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .stock-price {
            font-size: 2.2rem;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .stock-change {
            font-size: 1.1rem;
            margin-bottom: 15px;
        }
        
        .stock-details {
            font-size: 0.9rem;
            opacity: 0.8;
        }
        
        .positive { color: #00ff88; }
        .negative { color: #ff4757; }
        .neutral { color: #ffa502; }
        
        .loading {
            text-align: center;
            padding: 20px;
            font-size: 1.2rem;
        }
        
        .error {
            background: rgba(255,0,0,0.2);
            color: #ffdddd;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            text-align: center;
        }
        
        .update-time {
            text-align: center;
            margin-top: 20px;
            opacity: 0.7;
            font-size: 0.9rem;
        }
        
        .ranking {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 20px;
            margin-top: 20px;
        }
        
        .ranking h3 {
            margin-bottom: 15px;
            text-align: center;
        }
        
        .ranking-item {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            margin: 5px 0;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
        }
        
        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }
        
        .updating {
            animation: pulse 2s infinite;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🚀 실시간 주식 모니터링</h1>
        <div class="status-bar">
            <div class="status-item">
                📡 데이터소스: Redis 192.168.50.9
            </div>
            <div class="status-item">
                🔄 업데이트: <span id="update-interval">30초</span>
            </div>
            <div class="status-item">
                📊 상태: <span id="connection-status">연결 중...</span>
            </div>
            <div class="status-item">
                🔑 키: <span id="key-count">-</span>개
            </div>
        </div>
    </div>

    <div id="stocks-container">
        <div class="loading">
            <div class="updating">📊 실시간 데이터 로딩 중...</div>
        </div>
    </div>

    <div class="ranking" id="ranking-container" style="display: none;">
        <h3>📈 실시간 변동률 순위</h3>
        <div id="ranking-list"></div>
    </div>

    <div class="update-time">
        마지막 업데이트: <span id="last-update">-</span>
    </div>

    <script>
        let updateInterval = 30000; // 30초
        let stocks = [];
        
        // API 서버 URL
        const API_BASE = window.location.origin;
        
        // 주요 종목 코드 및 이모지
        const stockInfo = {
            '005930': { name: '삼성전자', emoji: '📱' },
            '066570': { name: 'LG전자', emoji: '🔥' },
            '005380': { name: '현대차', emoji: '🚗' },
            '000660': { name: 'SK하이닉스', emoji: '💾' },
            '035420': { name: 'NAVER', emoji: '🌐' },
            '035720': { name: '카카오', emoji: '💬' },
            '373220': { name: 'LG에너지솔루션', emoji: '🔋' },
            '105560': { name: 'KB금융', emoji: '🏦' },
            '000270': { name: '기아', emoji: '🚙' },
            '207940': { name: '삼성바이오로직스', emoji: '🧬' }
        };

        // 실시간 데이터 가져오기
        async function fetchStockData() {
            try {
                document.getElementById('connection-status').textContent = '데이터 수집 중...';
                
                // 서버 상태 확인
                const healthResponse = await fetch(`${API_BASE}/health`);
                const healthData = await healthResponse.json();
                
                if (healthData.status === 'ok') {
                    document.getElementById('connection-status').textContent = '✅ 연결됨';
                    document.getElementById('key-count').textContent = healthData.keys;
                } else {
                    throw new Error('서버 상태 불량');
                }

                // 전체 종목 데이터 가져오기
                const stocksResponse = await fetch(`${API_BASE}/stocks`);
                const stocksData = await stocksResponse.json();
                
                if (stocksData.stocks && stocksData.stocks.length > 0) {
                    stocks = stocksData.stocks;
                    displayStocks(stocks);
                    displayRanking(stocks);
                    document.getElementById('last-update').textContent = new Date().toLocaleString('ko-KR');
                } else {
                    throw new Error('주식 데이터 없음');
                }

            } catch (error) {
                console.error('데이터 가져오기 실패:', error);
                document.getElementById('connection-status').textContent = '❌ 연결 실패';
                displayError(error.message);
            }
        }

        // 주식 데이터 표시
        function displayStocks(stocksData) {
            const container = document.getElementById('stocks-container');
            
            if (!stocksData || stocksData.length === 0) {
                container.innerHTML = '<div class="error">📊 주식 데이터를 찾을 수 없습니다.</div>';
                return;
            }

            // 변동률 기준 정렬
            stocksData.sort((a, b) => (b.changeRate || 0) - (a.changeRate || 0));

            const stocksHTML = stocksData.map(stock => {
                const info = stockInfo[stock.stockCode] || { name: stock.stockName, emoji: '📊' };
                const changeClass = stock.changeRate > 0 ? 'positive' : 
                                  stock.changeRate < 0 ? 'negative' : 'neutral';
                const changeSymbol = stock.changeRate > 0 ? '+' : '';
                
                return `
                    <div class="stock-card">
                        <div class="stock-name">
                            ${info.emoji} ${info.name}
                            <span style="font-size: 0.8rem; opacity: 0.7;">(${stock.stockCode})</span>
                        </div>
                        <div class="stock-price ${changeClass}">
                            ${(stock.currentPrice || 0).toLocaleString()}원
                        </div>
                        <div class="stock-change ${changeClass}">
                            ${changeSymbol}${(stock.change || 0).toLocaleString()}원 
                            (${changeSymbol}${(stock.changeRate || 0).toFixed(2)}%)
                        </div>
                        <div class="stock-details">
                            거래량: ${(stock.volume || 0).toLocaleString()}주<br>
                            업데이트: ${stock.lastUpdate ? new Date(stock.lastUpdate).toLocaleTimeString('ko-KR') : '-'}
                        </div>
                    </div>
                `;
            }).join('');

            container.innerHTML = `<div class="stocks-grid">${stocksHTML}</div>`;
        }

        // 순위 표시
        function displayRanking(stocksData) {
            const container = document.getElementById('ranking-container');
            const list = document.getElementById('ranking-list');
            
            if (!stocksData || stocksData.length === 0) return;

            // 상위 5개와 하위 5개
            const topStocks = stocksData.slice(0, 5);
            const bottomStocks = stocksData.slice(-5).reverse();

            const topHTML = topStocks.map((stock, index) => {
                const info = stockInfo[stock.stockCode] || { name: stock.stockName, emoji: '📊' };
                return `
                    <div class="ranking-item">
                        <span>🚀 ${index + 1}. ${info.emoji} ${info.name}</span>
                        <span class="positive">+${(stock.changeRate || 0).toFixed(2)}%</span>
                    </div>
                `;
            }).join('');

            const bottomHTML = bottomStocks.map((stock, index) => {
                const info = stockInfo[stock.stockCode] || { name: stock.stockName, emoji: '📊' };
                return `
                    <div class="ranking-item">
                        <span>📉 ${info.emoji} ${info.name}</span>
                        <span class="negative">${(stock.changeRate || 0).toFixed(2)}%</span>
                    </div>
                `;
            }).join('');

            list.innerHTML = `
                <div style="margin-bottom: 15px;">
                    <h4 style="color: #00ff88; margin-bottom: 10px;">📈 상승률 TOP 5</h4>
                    ${topHTML}
                </div>
                <div>
                    <h4 style="color: #ff4757; margin-bottom: 10px;">📉 하락 종목</h4>
                    ${bottomHTML}
                </div>
            `;

            container.style.display = 'block';
        }

        // 오류 표시
        function displayError(message) {
            const container = document.getElementById('stocks-container');
            container.innerHTML = `
                <div class="error">
                    <h3>❌ 연결 오류</h3>
                    <p>${message}</p>
                    <p>잠시 후 다시 시도됩니다...</p>
                    <p><strong>API 서버 확인:</strong> <a href="${API_BASE}/health" target="_blank" style="color: #ffdddd;">${API_BASE}/health</a></p>
                </div>
            `;
        }

        // 초기 로드
        fetchStockData();

        // 주기적 업데이트
        setInterval(fetchStockData, updateInterval);

        // 페이지 제목에 실시간 표시
        setInterval(() => {
            if (stocks.length > 0) {
                const samsung = stocks.find(s => s.stockCode === '005930');
                if (samsung) {
                    document.title = `🚀 ${samsung.currentPrice?.toLocaleString()}원 (${samsung.changeRate?.toFixed(2)}%) - 실시간 주식`;
                }
            }
        }, 1000);

        console.log('🚀 실시간 주식 모니터링 시작!');
        console.log('📊 API 서버:', API_BASE);
        console.log('🔄 업데이트 간격:', updateInterval + 'ms');
    </script>
</body>
</html>

# ora2pg 설정 파일 - Oracle → PostgreSQL 마이그레이션 테스트
# ============================================================

# Oracle 접속 정보
ORACLE_HOME     /usr/lib/oracle/23/client64
ORACLE_DSN      dbi:Oracle:host=192.168.50.31;service_name=PROD;port=1521
ORACLE_USER     app_user
ORACLE_PWD      oracle

# PostgreSQL 접속 정보 (로컬)
PG_VERSION      16
PG_DSN          dbi:Pg:dbname=ora2pg_test;host=localhost;port=5432
PG_USER         postgres

# 내보내기 타입: TABLE, VIEW, SEQUENCE, TRIGGER, FUNCTION, PROCEDURE, PACKAGE, TYPE, PARTITION, etc.
TYPE            SHOW_REPORT

# 스키마 지정 (빈칸이면 전체)
SCHEMA          APP_USER

# 출력 디렉토리
OUTPUT_DIR      /root/.openclaw/workspace/ora2pg/output

# 인코딩
NLS_LANG        AMERICAN_AMERICA.UTF8
CLIENT_ENCODING UTF8

# 병렬 처리
JOBS            1

# 마이그레이션 비용 평가
ESTIMATE_COST   1
COST_UNIT_VALUE 5

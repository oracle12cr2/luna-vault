# 한국 ETF 자동매매 설정 (워크포워드 검증 완료)
# 최적화 리포트: /tmp/optimize_report.html
# 워크포워드 검증: /tmp/walkforward_report.html

data:
  start_date: "2020-01-01"
  end_date: "2023-12-31"
  
  # 핵심 5종 포트폴리오 (930만원)
  # 전 종목 워크포워드 PASS 확인 (IS: 2023~2024, OOS: 2025~현재)
  etfs:
    ace200: "102110.KS"                # 1. ACE 200 (시장 대표) - 30%
    kodex_leverage: "122630.KS"        # 2. KODEX 레버리지 (공격형) - 15%
    tiger_semi: "091230.KS"            # 3. TIGER 반도체 (성장 섹터) - 25%
    kodex_dividend: "279530.KS"        # 4. KODEX 고배당 (안정+배당) - 15%
    kodex_gold: "132030.KS"            # 5. KODEX 골드선물(H) (헤지) - 15%

  weights:
    ace200: 0.30
    kodex_leverage: 0.15
    tiger_semi: 0.25
    kodex_dividend: 0.15
    kodex_gold: 0.15

backtest:
  initial_cash: 9300000   # 930만원
  commission: 0.00015     # 수수료 0.015%
  slippage: 0.0002        # 슬리피지 0.02%

# ============================================================
# 종목별 최적 전략 (워크포워드 검증 PASS만 채택)
# ============================================================
# 판정 기준:
#   PASS: 샤프유지율 >= 0.5 AND 수익 방향 일치
#   IS = In-Sample (2023~2024), OOS = Out-of-Sample (2025~)
# ============================================================

per_etf_strategies:
  # ACE 200 → MA (OOS: +58.2%, 샤프 2.67, DD -8.5%)
  ace200:
    strategy: "ma"
    params:
      short_period: 3
      long_period: 15
    walkforward:
      is_return: 6.97
      is_sharpe: 0.36
      oos_return: 58.24
      oos_sharpe: 2.669
      oos_mdd: -8.45
      sharpe_retention: 7.41
      verdict: "PASS"

  # KODEX 레버리지 → MA (OOS: +135.4%, 샤프 2.57, DD -17.3%)
  kodex_leverage:
    strategy: "ma"
    params:
      short_period: 3
      long_period: 15
    walkforward:
      is_return: 11.96
      is_sharpe: 0.372
      oos_return: 135.43
      oos_sharpe: 2.574
      oos_mdd: -17.31
      sharpe_retention: 6.92
      verdict: "PASS"

  # TIGER 반도체 → RSI (OOS: +31.1%, 샤프 1.58, DD -13.0%)
  tiger_semi:
    strategy: "rsi"
    params:
      window: 9
      oversold: 30
      overbought: 75
    walkforward:
      is_return: 73.62
      is_sharpe: 1.666
      oos_return: 31.10
      oos_sharpe: 1.581
      oos_mdd: -13.02
      sharpe_retention: 0.95
      verdict: "PASS"

  # KODEX 고배당 → MA (OOS: +31.1%, 샤프 2.02, DD -11.0%)
  kodex_dividend:
    strategy: "ma"
    params:
      short_period: 7
      long_period: 30
    walkforward:
      is_return: 1.02
      is_sharpe: 0.102
      oos_return: 31.11
      oos_sharpe: 2.015
      oos_mdd: -11.04
      sharpe_retention: 19.75
      verdict: "PASS"

  # KODEX 골드 → BB (OOS: +11.2%, 샤프 1.73, DD -2.6%)
  kodex_gold:
    strategy: "bb"
    params:
      window: 15
      std_mult: 1.5
    walkforward:
      is_return: 29.45
      is_sharpe: 1.56
      oos_return: 11.22
      oos_sharpe: 1.726
      oos_mdd: -2.55
      sharpe_retention: 1.11
      verdict: "PASS"

# ============================================================
# 공통 전략 파라미터 (대시보드 단일 전략 모드용)
# ============================================================
strategies:
  moving_average_cross:
    name: "이동평균 크로스 전략"
    enabled: true
    params:
      short_period: 3
      long_period: 15

  rsi_strategy:
    name: "RSI 전략"
    enabled: true
    params:
      period: 9
      oversold: 30
      overbought: 75

  bollinger_band:
    name: "볼린저밴드 전략"
    enabled: true
    params:
      window: 15
      std_mult: 1.5

  grid_trading:
    name: "분할매매 전략"
    enabled: true
    params:
      ma_period: 10
      grid_pct: 5
      sell_pct: 5
      buy_pct: 15
      # 결과: 수익률 37.4%, 샤프 0.62, DD -21.9%

  asset_allocation:
    name: "정적 자산배분 전략"
    enabled: true
    params:
      stock_ratio: 0.6
      bond_ratio: 0.4
      rebalance_months: 3

output:
  save_charts: true
  chart_format: "png"
  results_dir: "results"
